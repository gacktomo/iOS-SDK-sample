<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>ログイン</title>
    <style>
        :root {
            color-scheme: light dark;
        }
        * { box-sizing: border-box; }
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, "Roboto", "Helvetica Neue", sans-serif;
            background: #fff8e1;
            color: #1c1c1e;
        }
        @media (prefers-color-scheme: dark) {
            html, body {
                background: #2a2410;
                color: #f2f2f7;
            }
        }
        body {
            display: flex;
            flex-direction: column;
            min-height: 100%;
            padding: 16px;
        }
        header {
            display: flex;
            justify-content: flex-end;
        }
        button.close {
            appearance: none;
            border: none;
            width: 32px;
            height: 32px;
            border-radius: 16px;
            background: rgba(120, 120, 128, 0.16);
            color: inherit;
            font-size: 18px;
            line-height: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        button.close:active { opacity: 0.6; }

        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 16px;
        }
        .splash-image {
            width: 120px;
            height: 120px;
            object-fit: contain;
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        .splash-image.loaded { opacity: 1; }
        h1.title {
            font-size: 24px;
            font-weight: 700;
            margin: 0;
            color: #ff9500;
        }
        button.login {
            appearance: none;
            border: none;
            border-radius: 12px;
            padding: 14px 32px;
            font-size: 17px;
            font-weight: 600;
            cursor: pointer;
            background: #ff9500;
            color: #ffffff;
            min-width: min(280px, 80vw);
            margin-top: 8px;
        }
        button.login:active { opacity: 0.7; }

        .sdk-tag {
            text-align: right;
            font-size: 10px;
            font-weight: 500;
            letter-spacing: 0.4px;
            text-transform: uppercase;
            opacity: 0.45;
        }
    </style>
</head>
<body>
    <header>
        <button class="close" id="closeButton" aria-label="閉じる">×</button>
    </header>

    <main>
        <img class="splash-image" id="splashImage" alt="">
        <h1 class="title">ChildSDK</h1>
        <button class="login" id="loginButton">ログイン</button>
    </main>

    <div class="sdk-tag">ChildSDK</div>

    <script>
        (function () {
            function postToNative(payload) {
                try {
                    if (window.uiBridge && typeof window.uiBridge.postMessage === "function") {
                        window.uiBridge.postMessage(JSON.stringify(payload));
                    }
                } catch (e) {
                    console.error("native bridge failed", e);
                }
            }

            const config = window.SDK_CONFIG || {};
            const img = document.getElementById("splashImage");
            if (config.splashImageURL) {
                img.addEventListener("load", function () {
                    img.classList.add("loaded");
                });
                img.src = config.splashImageURL;
            } else {
                img.style.display = "none";
            }

            document.getElementById("loginButton").addEventListener("click", function () {
                postToNative({ action: "login" });
            });
            document.getElementById("closeButton").addEventListener("click", function () {
                postToNative({ action: "close" });
            });
        })();
    </script>
</body>
</html>
