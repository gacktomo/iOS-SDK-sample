<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Camera Overlay</title>
    <style>
        * { box-sizing: border-box; }
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            background: transparent;
            font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif;
            color: #ffffff;
        }
        .root {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding:
                calc(env(safe-area-inset-top) + 12px)
                calc(env(safe-area-inset-right) + 12px)
                calc(env(safe-area-inset-bottom) + 12px)
                calc(env(safe-area-inset-left) + 12px);
            pointer-events: none;
        }
        .top-bar, .bottom-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            pointer-events: auto;
        }
        .badge {
            background: rgba(0, 0, 0, 0.5);
            -webkit-backdrop-filter: blur(10px);
            backdrop-filter: blur(10px);
            padding: 6px 12px;
            border-radius: 16px;
            font-size: 13px;
            font-weight: 500;
            text-shadow: 0 1px 2px rgba(0, 0, 0, 0.4);
        }
        button.close {
            appearance: none;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 20px;
            background: rgba(0, 0, 0, 0.5);
            -webkit-backdrop-filter: blur(10px);
            backdrop-filter: blur(10px);
            color: #ffffff;
            font-size: 22px;
            line-height: 22px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        button.close:active { opacity: 0.7; }
        .frame {
            flex: 1;
            margin: 16px 0;
            border: 2px solid rgba(255, 255, 255, 0.7);
            border-radius: 16px;
            box-shadow:
                inset 0 0 0 1px rgba(0, 0, 0, 0.25),
                0 0 0 9999px rgba(0, 0, 0, 0.15);
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div class="root">
        <div class="top-bar">
            <button class="close" id="closeButton" aria-label="閉じる">×</button>
            <span class="badge">WebView Overlay</span>
        </div>
        <div class="frame"></div>
        <div class="bottom-bar">
            <span class="badge">ChildrenSDK Camera</span>
        </div>
    </div>

    <script>
        (function () {
            function postToNative(payload) {
                try {
                    if (window.webkit
                        && window.webkit.messageHandlers
                        && window.webkit.messageHandlers.uiBridge) {
                        window.webkit.messageHandlers.uiBridge.postMessage(payload);
                    }
                } catch (e) {
                    console.error("native bridge failed", e);
                }
            }

            document.getElementById("closeButton").addEventListener("click", function () {
                postToNative({ action: "close" });
            });
        })();
    </script>
</body>
</html>
