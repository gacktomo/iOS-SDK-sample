<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>ChildrenSDK</title>
    <style>
        :root {
            color-scheme: light dark;
        }
        * {
            box-sizing: border-box;
        }
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif;
        }
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
            background: #fff8e1;
            color: #1c1c1e;
        }
        @media (prefers-color-scheme: dark) {
            body {
                background: #2a2410;
                color: #f2f2f7;
            }
        }
        h1 {
            font-size: 22px;
            margin: 0 0 8px;
        }
        p {
            margin: 0 0 32px;
            opacity: 0.7;
            font-size: 15px;
        }
        .actions {
            display: flex;
            flex-direction: column;
            gap: 12px;
            width: min(320px, 80vw);
        }
        button.action {
            appearance: none;
            border: none;
            border-radius: 12px;
            padding: 14px 32px;
            font-size: 17px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
        }
        button.primary {
            background: #ff9500;
            color: #ffffff;
        }
        button.secondary {
            background: rgba(120, 120, 128, 0.16);
            color: inherit;
        }
        button.action:active {
            opacity: 0.7;
        }
    </style>
</head>
<body>
    <h1>ChildrenSDK WebView</h1>
    <div class="actions">
        <button class="action primary" id="launchCameraButton">カメラ起動</button>
        <button class="action secondary" id="closeButton">閉じる</button>
    </div>

    <script>
        (function () {
            function postToNative(payload) {
                try {
                    if (window.webkit
                        && window.webkit.messageHandlers
                        && window.webkit.messageHandlers.uiBridge) {
                        window.webkit.messageHandlers.uiBridge.postMessage(payload);
                    }
                } catch (e) {
                    console.error("native bridge failed", e);
                }
            }

            document.getElementById("launchCameraButton").addEventListener("click", function () {
                postToNative({ action: "launchCamera" });
            });
            document.getElementById("closeButton").addEventListener("click", function () {
                postToNative({ action: "close" });
            });
        })();
    </script>
</body>
</html>
